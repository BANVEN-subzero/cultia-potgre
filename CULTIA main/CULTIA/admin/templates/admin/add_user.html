{% extends 'admin/base.html' %}

{% block title %}Add User{% endblock %}

{% block content %}
<div class="page-header">
    <div class="header-title">
        <h1>Add New User</h1>
        <p>Create a new user account</p>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div class="card-title">User Details</div>
    </div>
    <div class="card-body">
        <form method="post" action="{{ url_for('add_user') }}">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input id="first_name" name="first_name" class="form-control" type="text" value="{{ form.get('first_name','') }}" required>
            </div>

            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input id="last_name" name="last_name" class="form-control" type="text" value="{{ form.get('last_name','') }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" class="form-control" type="email" value="{{ form.get('email','') }}" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" class="form-control" type="password" required>
            </div>

            <div class="form-group">
                <label for="country">Country</label>
                <input id="country" name="country" class="form-control" type="text" value="{{ form.get('country','') }}">
            </div>

            <div class="form-group">
                <label for="interest">Interest</label>
                <input id="interest" name="interest" class="form-control" type="text" value="{{ form.get('interest','') }}">
            </div>

            <div class="form-actions" style="display:flex; gap:0.75rem;">
                <button type="submit" class="btn btn-primary">Create User</button>
                <a class="btn btn-secondary" href="{{ url_for('users') }}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

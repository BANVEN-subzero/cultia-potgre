{% extends 'admin/base.html' %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="page-header">
    <div class="header-title">
        <h1>Edit User</h1>
        <p>Update user account details</p>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div class="card-title">User Details</div>
    </div>
    <div class="card-body">
        <form method="post" action="{{ url_for('edit_user', user_id=user['id']) }}">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input id="first_name" name="first_name" class="form-control" type="text" value="{{ user['first_name'] }}" required>
            </div>

            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input id="last_name" name="last_name" class="form-control" type="text" value="{{ user['last_name'] }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" class="form-control" type="email" value="{{ user['email'] }}" required>
            </div>

            <div class="form-group">
                <label for="password">New Password (leave blank to keep current)</label>
                <input id="password" name="password" class="form-control" type="password">
            </div>

            <div class="form-group">
                <label for="country">Country</label>
                <input id="country" name="country" class="form-control" type="text" value="{{ user['country'] }}">
            </div>

            <div class="form-group">
                <label for="interest">Interest</label>
                <input id="interest" name="interest" class="form-control" type="text" value="{{ user['interest'] }}">
            </div>

            <div class="form-actions" style="display:flex; gap:0.75rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a class="btn btn-secondary" href="{{ url_for('users') }}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

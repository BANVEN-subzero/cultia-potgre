
<div class="card">
    <div class="card-header">
        <h3>Backup & Restore Settings</h3>
    </div>
    <div class="card-body">
        <form id="backup-settings-form">
            <div class="form-group">
                <label for="backup_enabled">
                    <input type="checkbox" id="backup_enabled" name="backup_enabled" {{ 'checked' if settings.backup_enabled else '' }}>
                    Enable Automatic Backups
                </label>
            </div>

            <div class="form-group">
                <label for="backup_frequency">Backup Frequency</label>
                <select id="backup_frequency" name="backup_frequency" class="form-control">
                    <option value="hourly" {{ 'selected' if settings.backup_frequency == 'hourly' else '' }}>Hourly</option>
                    <option value="daily" {{ 'selected' if settings.backup_frequency == 'daily' else '' }}>Daily</option>
                    <option value="weekly" {{ 'selected' if settings.backup_frequency == 'weekly' else '' }}>Weekly</option>
                    <option value="monthly" {{ 'selected' if settings.backup_frequency == 'monthly' else '' }}>Monthly</option>
                </select>
            </div>

            <div class="form-group">
                <label for="backup_retention">Backup Retention (Days)</label>
                <input type="number" id="backup_retention" name="backup_retention" class="form-control" value="{{ settings.backup_retention or 30 }}" min="1">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>

        <hr>

        <h5>Manual Actions</h5>
        <div class="form-actions" style="gap: 10px;">
            <button id="create-backup-btn" class="btn btn-success">
                <i class="fas fa-database"></i> Create Backup Now
            </button>
        </div>

        <div id="backup-status" class="mt-3"></div>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header">
        <h3>Existing Backups</h3>
    </div>
    <div class="card-body">
        <div id="backups-list">
            <p class="text-muted">Loading backups...</p>
        </div>
    </div>
</div>

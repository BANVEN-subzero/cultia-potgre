
<div class="card">
    <div class="card-header">
        <h3>General Settings</h3>
    </div>
    <div class="card-body">
        <form id="general-settings-form">
            <div class="form-group">
                <label for="site_title">Site Title</label>
                <input type="text" id="site_title" name="site_title" class="form-control" value="{{ settings.site_title or 'CULTIA Admin' }}">
            </div>

            <div class="form-group">
                <label for="site_description">Site Description</label>
                <textarea id="site_description" name="site_description" class="form-control" rows="3">{{ settings.site_description or 'CULTIA administration panel' }}</textarea>
            </div>

            <div class="form-group">
                <label for="site_url">Site URL</label>
                <input type="url" id="site_url" name="site_url" class="form-control" value="{{ settings.site_url or 'http://localhost:5000' }}">
            </div>

            <div class="form-group">
                <label for="admin_email">Admin Email</label>
                <input type="email" id="admin_email" name="admin_email" class="form-control" value="{{ settings.admin_email or 'admin@cultia.com' }}">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>
    </div>
</div>

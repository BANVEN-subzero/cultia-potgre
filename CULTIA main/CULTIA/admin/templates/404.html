<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --text-color: #333;
            --light-gray: #f5f7fa;
            --border-color: #e1e4e8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--light-gray);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
        }
        
        .error-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.1);
        }
        
        .error-title {
            font-size: 1.75rem;
            color: var(--secondary-color);
            margin-bottom: 1rem;
        }
        
        .error-message {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn i {
            margin-right: 8px;
        }
        
        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--secondary-color);
            margin-left: 10px;
        }
        
        .btn-outline:hover {
            background-color: #f8f9fa;
            color: var(--secondary-color);
        }
        
        .error-illustration {
            margin: 2rem 0;
            max-width: 250px;
            height: auto;
            opacity: 0.9;
        }
        
        .error-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .error-details {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 5px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #666;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        
        .show-details {
            background: none;
            border: none;
            color: var(--primary-color);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: inline-block;
        }
        
        .show-details:hover {
            text-decoration: none;
        }
        
        @media (max-width: 576px) {
            .error-code {
                font-size: 6rem;
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .error-message {
                font-size: 1rem;
            }
            
            .btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }
            
            .error-buttons {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .btn-outline {
                margin-left: 0;
            }
        }
        
        /* Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        
        /* Decorative elements */
        .decoration {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(52, 152, 219, 0.1);
            z-index: -1;
        }
        
        .decoration-1 {
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
        }
        
        .decoration-2 {
            bottom: -30px;
            left: -30px;
            width: 150px;
            height: 150px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <!-- Decorative elements -->
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        
        <!-- Error illustration (using Font Awesome icon as a fallback) -->
        <div class="floating">
            <i class="fas fa-exclamation-triangle" style="font-size: 5rem; color: #f39c12; margin-bottom: 1rem;"></i>
        </div>
        
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-message">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        
        <div class="error-buttons">
            <a href="/admin" class="btn">
                <i class="fas fa-home"></i> Back to Dashboard
            </a>
            <a href="#" onclick="window.history.back();" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>
        
        <button type="button" class="show-details" onclick="toggleDetails()">
            Show Details <i class="fas fa-chevron-down"></i>
        </button>
        
        <div class="error-details" id="errorDetails">
            <p><strong>Error:</strong> The requested URL <code id="errorPath"></code> was not found on this server.</p>
            <p><strong>Time:</strong> <span id="errorTime"></span></p>
            <p><strong>Browser:</strong> <span id="userAgent"></span></p>
            <p><strong>Referrer:</strong> <span id="referrer"></span></p>
        </div>
    </div>
    
    <script>
        // Set current path
        document.getElementById('errorPath').textContent = window.location.pathname;
        
        // Set current time
        const now = new Date();
        document.getElementById('errorTime').textContent = now.toLocaleString();
        
        // Set user agent
        document.getElementById('userAgent').textContent = navigator.userAgent;
        
        // Set referrer
        document.getElementById('referrer').textContent = document.referrer || 'No referrer';
        
        // Toggle error details
        function toggleDetails() {
            const details = document.getElementById('errorDetails');
            const button = document.querySelector('.show-details i');
            
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.className = 'fas fa-chevron-down';
                document.querySelector('.show-details').innerHTML = 'Show Details <i class="fas fa-chevron-down"></i>';
            } else {
                details.style.display = 'block';
                button.className = 'fas fa-chevron-up';
                document.querySelector('.show-details').innerHTML = 'Hide Details <i class="fas fa-chevron-up"></i>';
            }
        }
        
        // Add animation to buttons on hover
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
                this.style.boxShadow = '0 4px 8px rgba(0, 0, 0, 0.1)';
            });
            
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
                this.style.boxShadow = 'none';
            });
        });
    </script>
</body>
</html>

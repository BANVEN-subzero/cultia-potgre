<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameroon Cultural Directory</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-green: #2d5a27;
            --bg-light: #f8f9fa;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fdfaf5 0%, #f5f3f0 100%);
        }

        .hero-section {
            background: linear-gradient(135deg, #2d5a27 0%, #1a3a17 100%);
            padding: 100px 0 140px;
            color: white;
            border-radius: 0 0 50px 50px;
            margin-bottom: -60px;
        }

        .tribe-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            border: none;
            transition: var(--transition-smooth);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .tribe-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .tribe-img-wrapper {
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .tribe-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .tribe-card:hover .tribe-img {
            transform: scale(1.1);
        }

        .tribe-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--primary-green);
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-modern {
            border-radius: 15px;
            padding: 12px 25px;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .filter-pill {
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid #eee;
            background: white;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            white-space: nowrap;
        }

        .filter-pill.active {
            background: var(--primary-green);
            border-color: var(--primary-green);
            color: white;
            box-shadow: 0 5px 15px rgba(45, 90, 39, 0.3);
        }

        .filter-pill:hover:not(.active) {
            border-color: var(--primary-green);
            color: var(--primary-green);
        }

        .search-wrapper {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            display: flex;
            gap: 10px;
        }

        .search-input-group {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 18px 30px 18px 60px;
            border-radius: 50px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            font-size: 1.1rem;
            transition: var(--transition-smooth);
        }

        .search-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 0 35px;
            border-radius: 50px;
            font-weight: 700;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 25px rgba(45, 90, 39, 0.2);
        }

        .search-btn:hover {
            background: #1a3a17;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(45, 90, 39, 0.3);
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 20px 45px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-green);
            font-size: 1.2rem;
            z-index: 10;
        }

        .region-filter-container {
            position: relative;
            margin-bottom: 3rem;
        }

        #regionFilters {
            padding: 15px 0;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: auto;
            scrollbar-color: var(--primary-green) #eee;
        }

        #regionFilters::-webkit-scrollbar {
            height: 8px;
            display: block;
        }

        #regionFilters::-webkit-scrollbar-track {
            background: #eee;
            border-radius: 10px;
        }

        #regionFilters::-webkit-scrollbar-thumb {
            background: var(--primary-green);
            border-radius: 10px;
        }

        .region-section {
            margin-bottom: 4rem;
        }

        .region-header {
            background: linear-gradient(135deg, rgba(45, 90, 39, 0.05), rgba(45, 90, 39, 0.02));
            padding: 1.5rem 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border-left: 5px solid var(--primary-green);
        }

        .region-title {
            color: var(--primary-green);
            font-weight: 800;
            font-size: 1.75rem;
        }
    </style>
</head>

<body>
    <section class="hero-section text-center">
        <div class="container" data-aos="fade-up">
            <h1 class="display-3 fw-bold mb-3">Cameroon Cultural Directory</h1>
            <p class="lead opacity-75 mb-5 mx-auto" style="max-width: 700px;">Explore the vibrant mosaic of cultures, traditions, and people of Cameroon</p>
            
            <div class="search-wrapper mb-4">
                <div class="search-input-group">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search tribes, traditions, or regions..." id="tribeSearch">
                </div>
                <button class="search-btn" id="searchBtn">Search</button>
            </div>
        </div>
    </section>

    <div class="container py-5">
        <div class="region-filter-container" data-aos="fade-up" data-aos-delay="100">
            <div class="d-flex gap-3 overflow-auto pb-3" id="regionFilters">
                <div class="filter-pill active" data-region="all">All Regions</div>
            </div>
        </div>

        <div id="tribesContainer">
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({ duration: 800, once: true });

            const data = {
                "cameroon_tribes_by_region": [
                    {
                        "region": "West Region",
                        "tribes": [
                            {"name": "Bamileke", "description": "Vibrant traditional celebration masks and dense grassfields beadwork.", "image_url": "https://images.unsplash.com/photo-1599733589046-10c005739ef9?w=500&auto=format&fit=crop"},
                            {"name": "Bamun", "description": "Historic architecture, clay pottery arts, and royal palace craftsmanship.", "image_url": "https://images.unsplash.com/photo-1513519245088-0e12902e5a38?w=500&auto=format&fit=crop"},
                            {"name": "Menoua", "description": "Deep-rooted Grassfield traditions, royal Ndop lineage displays, and community honors.", "image_url": "https://images.unsplash.com/photo-1509281373149-e957c6296406?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "Centre Region",
                        "tribes": [
                            {"name": "Beti", "description": "Equatorial forest community celebrations featuring vibrant patterned attire.", "image_url": "https://images.unsplash.com/photo-1534330207526-8e81f10ec6fe?w=500&auto=format&fit=crop"},
                            {"name": "Bassa (Centre)", "description": "Historic regional assembly representations, ancestral woodcarvings, and symbols.", "image_url": "https://images.unsplash.com/photo-1561414927-6d86591d0c4f?w=500&auto=format&fit=crop"},
                            {"name": "Ewondo", "description": "Traditional governance gatherings and forest-zone musical rhythm instruments.", "image_url": "https://images.unsplash.com/photo-1524368535928-5b5e00ddc76b?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "Littoral Region",
                        "tribes": [
                            {"name": "Sawa (Coastal Peoples)", "description": "Regatta water racing festivals and sacred sea-spirit invocation ceremonies.", "image_url": "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&auto=format&fit=crop"},
                            {"name": "Duala", "description": "Elegantly draped Kaba gowns worn during grand coastal heritage assemblies.", "image_url": "https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=500&auto=format&fit=crop"},
                            {"name": "Bassa (Littoral)", "description": "Rhythmic Assiko dance movements accompanied by live acoustic folk instruments.", "image_url": "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "Northwest Region",
                        "tribes": [
                            {"name": "Kom", "description": "Thatch-roofed royal architectural compounds built high in the hillside valleys.", "image_url": "https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=500&auto=format&fit=crop"},
                            {"name": "Nso", "description": "Intricately hand-stitched black and gold geometric royal Toghu tunics.", "image_url": "https://images.unsplash.com/photo-1582562124811-c09040d0a901?w=500&auto=format&fit=crop"},
                            {"name": "Bali", "description": "The monumental annual Lela festival featuring prominent warrior feather headdresses.", "image_url": "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "Southwest Region",
                        "tribes": [
                            {"name": "Bakweri", "description": "The spiritual elephant dance (Male society) rooted along Mount Fako slopes.", "image_url": "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&auto=format&fit=crop"},
                            {"name": "Bakossi", "description": "Lush, sacred volcanic crater lake landscapes wrapped in deep tribal folklore.", "image_url": "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=500&auto=format&fit=crop"},
                            {"name": "Tiv", "description": "Distinctive locally woven black-and-white striped heritage garments.", "image_url": "https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "Adamawa Region",
                        "tribes": [
                            {"name": "Fulani (Fulbe)", "description": "Equestrian northern pageantry displays featuring majestic, flowing grand boubous.", "image_url": "https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=500&auto=format&fit=crop"},
                            {"name": "Tikar", "description": "Traditional clay-molded bronze casting foundries using ancient metallic techniques.", "image_url": "https://images.unsplash.com/photo-1536924940846-227afb31e2a5?w=500&auto=format&fit=crop"},
                            {"name": "Mbum", "description": "Earthen high-capacity grain storage structures built from sun-dried clay.", "image_url": "https://images.unsplash.com/photo-1595855759920-86582396756a?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "Far North Region",
                        "tribes": [
                            {"name": "Kanuri", "description": "Dignified Sahelian court parades showcasing formal long white protective turbans.", "image_url": "https://images.unsplash.com/photo-1489749798305-4fea3ae63d43?w=500&auto=format&fit=crop"},
                            {"name": "Mandara", "description": "Ancient mountain fortress structures, stonework outcroppings, and historical sultanates.", "image_url": "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500&auto=format&fit=crop"},
                            {"name": "Mafa", "description": "Beautiful, engineering-focused stone agricultural terraces lining steep mountain walls.", "image_url": "https://images.unsplash.com/photo-1500627869374-13cd993b1115?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "East Region",
                        "tribes": [
                            {"name": "Sara", "description": "Savanna edge river fishermen navigating matching hand-carved pirogues.", "image_url": "https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=500&auto=format&fit=crop"},
                            {"name": "Gbaya", "description": "Earthen-wall residential design concepts native to the southeastern forest edge.", "image_url": "https://images.unsplash.com/photo-1510798831971-661eb04b3739?w=500&auto=format&fit=crop"},
                            {"name": "Mandjia", "description": "Traditional agrarian harvesting practices using wide hand-woven winnowing trays.", "image_url": "https://images.unsplash.com/photo-1592417817098-8f3d6eb18865?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "North Region",
                        "tribes": [
                            {"name": "Mada", "description": "Communal musical wind ensembles playing elongated, masterfully carved wood horns.", "image_url": "https://images.unsplash.com/photo-1465847899084-d164df4dedc6?w=500&auto=format&fit=crop"},
                            {"name": "Guiziga", "description": "Rhythmic, geometric celebratory patterns on mud compound entrance doorways.", "image_url": "https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=500&auto=format&fit=crop"},
                            {"name": "Dagara", "description": "Traditional kiln-fired clay water vessels decorated with fine local motifs.", "image_url": "https://images.unsplash.com/photo-1578749556568-bc2c40e68b61?w=500&auto=format&fit=crop"}
                        ]
                    },
                    {
                        "region": "South Region",
                        "tribes": [
                            {"name": "Bulu", "description": "Deep-forest structural instruments including massive hollowed talking log drums.", "image_url": "https://images.unsplash.com/photo-1442504028989-ab58b5f29a4a?w=500&auto=format&fit=crop"},
                            {"name": "Fang (South)", "description": "Orally preserved ancestral history narratives accompanied by the Mvet stringed harp.", "image_url": "https://images.unsplash.com/photo-1457369804613-52c61a468e7d?w=500&auto=format&fit=crop"},
                            {"name": "Pov", "description": "Pristine equatorial rainforest canopies characterizing the southern border zones.", "image_url": "https://images.unsplash.com/photo-1448375240586-882707db888b?w=500&auto=format&fit=crop"}
                        ]
                    }
                ]
            };

            let currentRegion = 'all';

            function renderRegions() {
                const regionFilters = document.getElementById('regionFilters');
                const allBtn = regionFilters.querySelector('[data-region="all"]');
                
                data.cameroon_tribes_by_region.forEach(regionData => {
                    const pill = document.createElement('div');
                    pill.className = 'filter-pill';
                    pill.textContent = regionData.region;
                    pill.setAttribute('data-region', regionData.region);
                    pill.addEventListener('click', () => {
                        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                        pill.classList.add('active');
                        currentRegion = regionData.region;
                        document.getElementById('tribeSearch').value = '';
                        renderTribes();
                    });
                    regionFilters.appendChild(pill);
                });

                allBtn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                    allBtn.classList.add('active');
                    currentRegion = 'all';
                    document.getElementById('tribeSearch').value = '';
                    renderTribes();
                });
            }

            function renderTribes() {
                const container = document.getElementById('tribesContainer');
                const searchTerm = document.getElementById('tribeSearch').value.toLowerCase();
                
                container.innerHTML = '';
                let hasResults = false;

                data.cameroon_tribes_by_region.forEach(regionData => {
                    const filteredTribes = regionData.tribes.filter(tribe => {
                        const matchesRegion = currentRegion === 'all' || (regionData.region === currentRegion);
                        
                        const name = (tribe.name || '').toLowerCase();
                        const description = (tribe.description || '').toLowerCase();
                        const region = regionData.region.toLowerCase();
                        
                        const matchesSearch = name.includes(searchTerm) || 
                                            description.includes(searchTerm) ||
                                            region.includes(searchTerm);
                                            
                        return matchesRegion && matchesSearch;
                    });

                    if (filteredTribes.length > 0) {
                        hasResults = true;
                        
                        const regionSection = document.createElement('div');
                        regionSection.className = 'region-section';
                        regionSection.setAttribute('data-aos', 'fade-up');
                        
                        regionSection.innerHTML = `
                            <div class="region-header">
                                <h3 class="region-title">${regionData.region}</h3>
                            </div>
                            <div class="row g-4 tribe-grid"></div>
                        `;
                        container.appendChild(regionSection);

                        const grid = regionSection.querySelector('.tribe-grid');
                        
                        filteredTribes.forEach((tribe, index) => {
                            const col = document.createElement('div');
                            col.className = 'col-md-6 col-lg-4';
                            col.setAttribute('data-aos', 'fade-up');
                            col.setAttribute('data-aos-delay', (index % 3) * 100);

                            col.innerHTML = `
                                <div class="tribe-card">
                                    <div class="tribe-img-wrapper">
                                        <img src="${tribe.image_url}" class="tribe-img" alt="${tribe.name}">
                                        <span class="tribe-badge">${regionData.region}</span>
                                    </div>
                                    <div class="card-body p-4 d-flex flex-column">
                                        <h4 class="fw-bold mb-2">${tribe.name}</h4>
                                        <p class="text-muted small mb-4 flex-grow-1">${tribe.description}</p>
                                    </div>
                                </div>
                            `;
                            grid.appendChild(col);
                        });
                    }
                });

                if (!hasResults) {
                    container.innerHTML = '<div class="text-center py-5"><p class="text-muted">No tribes found matching your criteria.</p></div>';
                }

                AOS.refresh();
            }

            document.getElementById('tribeSearch').addEventListener('input', renderTribes);
            document.getElementById('searchBtn').addEventListener('click', renderTribes);

            renderRegions();
            renderTribes();
        });
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIA - Cultural Story Creator</title>
    <link rel="icon" type="image/png" href="../img/top.png">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Main Styles for Modals -->
    <link href="../css/styles.css" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        body {
            background: #fdfaf5;
            display: flex;
            min-height: 100vh;
        }
        
        .main-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .page-hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 60px 0 80px;
            color: white;
            border-radius: 0 0 50px 50px;
            margin-bottom: -50px;
        }
        
        .form-container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        
        .form-label {
            color: #2d5a27 !important;
            font-weight: 700;
        }
        
        .form-control,
        .form-select {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 14px 18px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus,
        .form-select:focus {
            border-color: #2d5a27;
            box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.1);
            background: white;
        }
        
        .btn-submit {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
        }
        
        .story-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .story-card:hover {
            transform: translateY(-5px);
            border-color: #f093fb;
            box-shadow: 0 10px 40px rgba(240, 147, 251, 0.2);
        }
        
        .story-title {
            color: #2d5a27;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .story-meta {
            color: #6c757d;
            font-size: 0.875rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <!-- Header Placeholder -->
        <div id="header-container"></div>
        
        <section class="page-hero">
            <div class="container-fluid px-5">
                <div class="row">
                    <div class="col-lg-8" data-aos="fade-right">
                        <h1 class="display-4 fw-bold mb-3">📖 Cultural Story Creator</h1>
                        <p class="lead opacity-75">Share your cultural stories and traditions with the CULTIA community</p>
                    </div>
                </div>
            </div>
        </section>
        
        <div class="container-fluid px-5 py-4">
        
            <div class="form-container" data-aos="fade-up">
                <form id="storyForm">
                    <div class="mb-4">
                        <label for="title" class="form-label">Story Title *</label>
                        <input type="text" id="title" name="title" class="form-control" required placeholder="Give your story a catchy title...">
                    </div>
                    
                    <div class="mb-4">
                        <label for="tribe" class="form-label">Cultural Group/Tribe</label>
                        <select id="tribe" name="tribe" class="form-select">
                            <option value="">Select a cultural group...</option>
                            <option value="Bamileke">Bamileke</option>
                            <option value="Bamun">Bamun</option>
                            <option value="Fulani">Fulani</option>
                            <option value="Betí-Pahuín">Betí-Pahuín</option>
                            <option value="Bassa">Bassa</option>
                            <option value="Bakweri">Bakweri</option>
                            <option value="Duala">Duala</option>
                            <option value="Tikar">Tikar</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label for="content" class="form-label">Your Story *</label>
                        <textarea id="content" name="content" class="form-control" rows="8" required placeholder="Share your story, tradition, or cultural knowledge here..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-submit w-100 text-white">Submit Story for Review</button>
                </form>
                
                <div id="message" class="mt-4"></div>
            </div>
            
            <div class="mt-5">
                <h2 class="fw-bold mb-4" style="color: #2d5a27;" data-aos="fade-right">✨ Community Stories</h2>
                <div class="row g-4" id="storiesGrid">
                    <!-- Stories will be loaded here -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animations JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize AOS
        AOS.init({ duration: 800, once: true });
        
        // Load Sidebar
        fetch('includes/sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                const currentPage = window.location.pathname.split("/").pop();
                const activeLink = document.querySelector(`.nav-link[href="${currentPage}"]`);
                if (activeLink) activeLink.closest('.nav-item').classList.add('active');
                
                const sidebarToggle = document.getElementById('sidebarToggle');
                const sidebar = document.getElementById('sidebar');
                if(sidebarToggle && sidebar) {
                    sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('show'));
                }
            });
        
        // Load Header
        fetch('includes/header.html')
            .then(response => response.text())
            .then(data => {
                const title = document.title.split(' - ')[0];
                document.getElementById('header-container').innerHTML = data.replace('{{PAGE_TITLE}}', title);
                const mobileMenuBtn = document.getElementById('mobileMenuBtn');
                if(mobileMenuBtn) {
                    mobileMenuBtn.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('show'));
                }
            });
        
        // Load published stories
        async function loadStories() {
            try {
                const response = await fetch('/api/user-stories/published');
                const data = await response.json();
                if (data.success) {
                    const grid = document.getElementById('storiesGrid');
                    if (data.stories.length === 0) {
                        grid.innerHTML = '<div class="col-12 text-center py-5 text-muted"><i class="fas fa-pen-fancy d-block fs-1 mb-3 opacity-50"></i><p class="lead">No stories yet. Be the first to share!</p></div>';
                    } else {
                        grid.innerHTML = data.stories.map(story => `
                            <div class="col-md-6 col-lg-4" data-aos="fade-up">
                                <div class="story-card">
                                    <h3 class="story-title">${story.title}</h3>
                                    <p class="story-meta"><i class="fas fa-user me-1"></i> by ${story.author_name}</p>
                                    <p class="text-muted">${story.content.substring(0, 150)}...</p>
                                    <div class="d-flex justify-content-between align-items-center mt-3">
                                        <span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3 py-1"><i class="fas fa-users me-1"></i>${story.tribe || 'General'}</span>
                                        <span class="text-muted"><i class="fas fa-file-word me-1"></i>${story.word_count} words · <i class="fas fa-coins me-1"></i>${story.base_points} pts</span>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading stories:', error);
                document.getElementById('storiesGrid').innerHTML = '<div class="col-12 text-center py-5 text-muted"><i class="fas fa-exclamation-triangle d-block fs-1 mb-3 opacity-50"></i><p class="lead">Error loading stories. Please refresh.</p></div>';
            }
        }
        
        // Submit new story
        document.getElementById('storyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            const submitBtn = e.target.querySelector('button');
            
            submitBtn.disabled = true;
            messageDiv.innerHTML = '';
            
            try {
                const title = document.getElementById('title').value;
                const tribe = document.getElementById('tribe').value;
                const content = document.getElementById('content').value;
                
                const response = await fetch('/api/user-stories', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title,
                        tribe,
                        content
                    }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                if (data.success) {
                    messageDiv.innerHTML = '<div class="alert alert-success rounded-pill text-center fw-bold"><i class="fas fa-check-circle me-2"></i>🎉 ' + data.message + '</div>';
                    e.target.reset();
                    loadStories();
                } else {
                    messageDiv.innerHTML = '<div class="alert alert-danger rounded-pill text-center fw-bold"><i class="fas fa-exclamation-circle me-2"></i>❌ ' + data.message + '</div>';
                }
            } catch (error) {
                console.error('Submission error:', error);
                messageDiv.innerHTML = '<div class="alert alert-danger rounded-pill text-center fw-bold"><i class="fas fa-exclamation-circle me-2"></i>❌ An error occurred. Please try again.</div>';
            } finally {
                submitBtn.disabled = false;
            }
        });
        
        // Load stories on page load
        loadStories();
    </script>
</body>
</html>

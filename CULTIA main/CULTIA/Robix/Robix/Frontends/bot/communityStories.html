<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Stories - CULTIA</title>
    <link rel="icon" type="image/png" href="../img/top.png">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-green: #2d5a27;
            --accent-orange: #e67e22;
            --bg-light: #fdfaf5;
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        .main-content {
            flex: 1;
            background: #fdfaf5;
        }

        .hero-section {
            background: linear-gradient(rgba(45, 90, 39, 0.9), rgba(26, 58, 22, 0.9)), url('../img/folklore-bg.jpg');
            background-size: cover;
            background-position: center;
            padding: 120px 0 160px;
            color: white;
            border-radius: 0 0 60px 60px;
            margin-bottom: -60px;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '♥';
            position: absolute;
            right: 10%;
            bottom: -50px;
            font-size: 300px;
            opacity: 0.1;
            font-family: 'Playfair Display', serif;
            color: white;
        }

        .story-card {
            background: white;
            border-radius: 35px;
            padding: 40px;
            height: 100%;
            border: none;
            transition: var(--transition-smooth);
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-left: 8px solid var(--accent-orange);
        }

        .story-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 35px 70px rgba(0,0,0,0.1);
            border-left-color: var(--primary-green);
        }

        .story-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .story-meta-badge {
            background: #f8f9fa;
            color: var(--primary-green);
            padding: 0.35rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .story-title {
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }

        .story-author {
            color: #636e72;
            margin-bottom: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .story-excerpt {
            color: #636e72;
            line-height: 1.8;
            font-size: 1.05rem;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .btn-read {
            background: #f8f9fa;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            border-radius: 18px;
            padding: 14px 30px;
            font-weight: 700;
            transition: var(--transition-smooth);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
        }

        .btn-read:hover {
            background: var(--primary-green);
            color: white;
            transform: translateX(10px);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .search-input {
            width: 100%;
            padding: 20px 30px 20px 65px;
            border-radius: 50px;
            border: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            font-size: 1.1rem;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            outline: none;
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-green);
            font-size: 1.4rem;
        }
    </style>
</head>

<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="header-container"></div>

        <section class="hero-section text-center">
            <div class="container" data-aos="fade-up">
                <h1 class="display-3 fw-bold mb-3">Community Stories</h1>
                <p class="lead opacity-75 mb-5 mx-auto" style="max-width: 700px;">Stories shared and approved by our cultural community. Each tale is a piece of living heritage.</p>
                
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search community stories..." id="storySearch">
                </div>
            </div>
        </section>

        <div class="container py-5">
            <div class="row g-4" id="storyGrid">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Loading stories...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animations JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({ duration: 800, once: true });
            
            // Shared Components
            fetch('includes/sidebar.html').then(r => r.text()).then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                document.getElementById('sidebarToggle')?.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('show');
                });
            });

            fetch('includes/header.html').then(r => r.text()).then(data => {
                document.getElementById('header-container').innerHTML = data.replace('{{PAGE_TITLE}}', 'Community Stories');
                document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('show');
                });
            });

            // Load stories
            loadCommunityStories();

            // Search logic
            const searchInput = document.getElementById('storySearch');
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.story-card');
                cards.forEach(card => {
                    const title = card.querySelector('h3').textContent.toLowerCase();
                    const desc = card.querySelector('.story-excerpt').textContent.toLowerCase();
                    if(title.includes(term) || desc.includes(term)) {
                        card.parentElement.style.display = 'block';
                    } else {
                        card.parentElement.style.display = 'none';
                    }
                });
            });
        });

        async function loadCommunityStories() {
            const storyGrid = document.getElementById('storyGrid');
            try {
                const response = await fetch('/api/user-stories/approved');
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.stories) {
                        renderCommunityStories(data.stories);
                    } else {
                        renderNoStories();
                    }
                } else {
                    renderNoStories();
                }
            } catch (error) {
                console.error('Error loading stories:', error);
                renderNoStories();
            }
        }

        function renderCommunityStories(stories) {
            const storyGrid = document.getElementById('storyGrid');
            storyGrid.innerHTML = '';
            
            if (!stories.length) {
                renderNoStories();
                return;
            }
            
            stories.forEach((story, index) => {
                const delay = (index % 3) * 100;
                const cardCol = document.createElement('div');
                cardCol.className = 'col-md-6 col-lg-4';
                cardCol.setAttribute('data-aos', 'fade-up');
                cardCol.setAttribute('data-aos-delay', delay.toString());
                
                const excerpt = story.content.length > 200 ? story.content.substring(0, 200) + '...' : story.content;
                
                cardCol.innerHTML = `
                    <div class="story-card">
                        <div class="story-meta">
                            <span class="story-meta-badge"><i class="fas fa-tags me-1"></i> ${story.tribe || 'Cultural Tale'}</span>
                        </div>
                        <h3 class="story-title">${story.title}</h3>
                        <p class="story-author">
                            <i class="fas fa-user-circle"></i> Shared by ${story.author_name}
                        </p>
                        <p class="story-excerpt">${excerpt}</p>
                        <button class="btn-read" onclick="showStoryDetails('${story.story_id}')">
                            Read Full Story <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                `;
                
                storyGrid.appendChild(cardCol);
            });
            
            // Refresh AOS for new elements
            AOS.refresh();
        }

        function renderNoStories() {
            const storyGrid = document.getElementById('storyGrid');
            storyGrid.innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="fas fa-book-open display-1 text-muted opacity-25 mb-4"></i>
                    <h3 class="fw-bold text-muted mb-3">No Community Stories Yet</h3>
                    <p class="text-muted mb-4">Be the first to share a cultural tale with our community!</p>
                    <a href="story-creator.html" class="btn btn-lg btn-success rounded-pill px-5">
                        <i class="fas fa-pen-fancy me-2"></i> Share a Story
                    </a>
                </div>
            `;
        }

        function showStoryDetails(storyId) {
            alert('Full story view coming soon!');
        }
    </script>
</body>

</html>
